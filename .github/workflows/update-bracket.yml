name: Update World Cup Bracket

on:
  schedule:
    # Every 15 minutes, nominally — GitHub Actions doesn't reliably honor
    # very short cron intervals (this is a documented platform limitation,
    # not something fixable via config), so treat this as "best effort,
    # sometimes slower" rather than an exact guarantee. Given a match runs
    # 90+ minutes, occasional delays beyond 15 min rarely matter in practice.
    # During a live match you can also click "Run workflow" below for an
    # on-demand refresh if you want it fresher right now.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest bracket data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-bracket.js

      - name: Commit updated data (if changed)
        run: |
          git config user.name "bracket-bot"
          git config user.email "actions@github.com"
          git add data/bracket-data.json
          git diff --quiet --cached || git commit -m "Auto-update bracket data"
          git push
