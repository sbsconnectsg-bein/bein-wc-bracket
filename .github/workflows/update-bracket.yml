name: Update World Cup Bracket

on:
  schedule:
    # Every 5 minutes (~288 calls/day) — football-data.org's free tier limit is
    # 10 requests/minute, so this is nowhere close regardless of daily volume.
    # During a live match you can also click "Run workflow" below for an on-demand refresh.
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest bracket data
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-bracket.js

      - name: Commit updated data (if changed)
        run: |
          git config user.name "bracket-bot"
          git config user.email "actions@github.com"
          git add data/bracket-data.json
          git diff --quiet --cached || git commit -m "Auto-update bracket data"
          git push
