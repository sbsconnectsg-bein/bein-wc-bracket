<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>beIN SPORTS — FIFA World Cup 2026 Final Stage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Yodeck fallback: forces a hard reload every 15 min in case the browser tab is long-lived -->
<meta http-equiv="refresh" content="900">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stage">
    <div class="header">
      <div class="header-top">
        <img class="logo" src="assets/bein-logo.webp" alt="beIN SPORTS">
        <div class="status">
          <div class="clock" id="clock">--:--</div>
          <div class="updated" id="updated-at"><span class="dot"></span>Loading…</div>
        </div>
      </div>
      <div class="header-title">
        <div class="eyebrow">Final Stage</div>
        <h1>FIFA World Cup 2026</h1>
      </div>
    </div>

    <div class="final-hero" id="final-hero"></div>
    <div class="third-hero" id="third-hero"></div>
    <div class="boot-section" id="boot-section"></div>

    <div class="footer">
      <div>beIN SPORTS &middot; FIFA World Cup 2026 &middot; Canada · Mexico · USA</div>
      <div>All times SGT</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
